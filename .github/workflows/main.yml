name: Build Particle Mod (.so)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  NDK_VERSION: "27.0.12077973"
  CMAKE_VERSION: "3.22.1"
  JAVA_VERSION: "21"
  LEVI_REPO: "https://github.com/LiteLDev/LeviLaunchroid.git"

jobs:
  build:
    name: Build .so
    runs-on: ubuntu-latest

    steps:
      - name: Clone LeviLauncher
        run: |
          git clone --depth=1 --recurse-submodules ${{ env.LEVI_REPO }} launcher

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Install NDK and CMake
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;${{ env.CMAKE_VERSION }}" \
            --sdk_root=$ANDROID_HOME

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('launcher/**/*.gradle*', 'launcher/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── Decodifica os arquivos do mod direto do workflow ────────
      - name: Inject mod files
        run: |
          CPP_DEST="launcher/app/src/main/cpp/inbuiltmods/src/particles"
          JAVA_BASE="launcher/app/src/main/java/org/levimc/launcher/core/mods/inbuilt"

          mkdir -p "$CPP_DEST"
          mkdir -p "$JAVA_BASE/nativemod"
          mkdir -p "$JAVA_BASE/overlay"
          mkdir -p "$JAVA_BASE/model"

          echo "" | base64 -d > "$CPP_DEST/particles.cpp"
          echo "" | base64 -d > "$JAVA_BASE/nativemod/ParticleMod.java"
          echo "" | base64 -d > "$JAVA_BASE/overlay/ParticleControlOverlay.java"
          echo "" | base64 -d > "$JAVA_BASE/model/ModIds.java"
          echo "" | base64 -d > "launcher/app/src/main/cpp/inbuiltmods/CMakeLists.txt"

          echo "=== Arquivos injetados ==="
          ls -lh "$CPP_DEST"
          ls -lh "$JAVA_BASE/nativemod"
          ls -lh "$JAVA_BASE/overlay"

      - name: Build Debug APK
        working-directory: launcher
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Extract libinbuiltmods.so
        run: |
          APK=$(find launcher/app/build/outputs/apk/debug -name "*.apk" | head -1)
          mkdir -p extracted
          unzip -j "$APK" "lib/arm64-v8a/libinbuiltmods.so" -d extracted/
          ls -lh extracted/libinbuiltmods.so

      - name: Upload libinbuiltmods.so
        uses: actions/upload-artifact@v4
        with:
          name: libinbuiltmods-${{ github.sha }}
          path: extracted/libinbuiltmods.so
          retention-days: 30

      - name: Build summary
        if: always()
        run: |
          echo "## 📦 Build Summary" >> $GITHUB_STEP_SUMMARY
          if [ -f extracted/libinbuiltmods.so ]; then
            SIZE=$(du -sh extracted/libinbuiltmods.so | cut -f1)
            echo "✅ **libinbuiltmods.so** — $SIZE" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ .so não encontrado" >> $GITHUB_STEP_SUMMARY
          fi
