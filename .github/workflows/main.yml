name: Build LeviLauncher + Particle Mod

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:      # permite rodar manualmente pelo GitHub UI

env:
  NDK_VERSION: "27.0.12077973"
  CMAKE_VERSION: "3.22.1"
  JAVA_VERSION: "21"

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive   # importante: o projeto usa git submodules

      # ── 2. Java ─────────────────────────────────────────────────
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      # ── 3. Android SDK + NDK + CMake ────────────────────────────
      - name: Install NDK and CMake
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;${{ env.CMAKE_VERSION }}" \
            --sdk_root=$ANDROID_HOME

      # ── 4. Cache Gradle ─────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── 5. Permissão do Gradle wrapper ──────────────────────────
      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      # ── 6. Decode keystore (apenas em push, não em PRs) ─────────
      #       Configure o secret KEYSTORE_BASE64 no seu repositório:
      #       Settings → Secrets → Actions → New repository secret
      #       Gere com: base64 -w 0 sua-keystore.jks > keystore.b64
      - name: Decode keystore
        if: github.event_name != 'pull_request'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
          echo "Keystore decoded successfully"

      # ── 7. Build Debug ──────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ── 8. Build Release (apenas em push com keystore) ──────────
      - name: Build Release APK
        if: github.event_name != 'pull_request'
        env:
          KEYSTORE_PATH:    ${{ github.workspace }}/app/keystore.jks
          KEY_ALIAS:        ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:     ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD:   ${{ secrets.STORE_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
            --stacktrace

      # ── 9. Limpa keystore da memória ────────────────────────────
      - name: Clean keystore
        if: always()
        run: rm -f app/keystore.jks

      # ── 10. Upload Debug APK ────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: LeviLauncher-ParticleMod-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      # ── 11. Upload Release APK ──────────────────────────────────
      - name: Upload Release APK
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: LeviLauncher-ParticleMod-release-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── 12. Summary no GitHub UI ────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          echo "## 📦 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Arquivo | Tamanho |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|" >> $GITHUB_STEP_SUMMARY
          find app/build/outputs/apk -name "*.apk" 2>/dev/null | while read apk; do
            size=$(du -sh "$apk" | cut -f1)
            name=$(basename "$apk")
            echo "| $name | $size |" >> $GITHUB_STEP_SUMMARY
          done || echo "Nenhum APK encontrado" >> $GITHUB_STEP_SUMMARY
